<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chenyang Shen | Homepage</title>
    <meta
      name="description"
      content="Academic homepage of Chenyang Shen."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="site-title" href="#top">Chenyang Shen / Homepage</a>
        <nav class="nav">
          <a href="#about">About</a>
          <a href="#publications">Publications</a>
          <a href="#contact">Contact</a>
        </nav>
      </div>
    </header>

    <main class="layout" id="top">
      <aside class="sidebar" id="about">
        <div class="avatar-wrap">
          <img
            class="avatar hidden"
            id="profile-photo"
            alt="Portrait of Chenyang Shen"
          />
          <div class="avatar-fallback" id="profile-fallback">CS</div>
        </div>
        <h1 class="name" id="profile-name">Chenyang Shen</h1>
        <p class="role" id="profile-role">B.Eng. Student in Automation</p>
        <p class="affiliation" id="profile-affiliation">
          Harbin Institute of Technology, Weihai
        </p>

        <div class="contact-list" id="contact-list"></div>
      </aside>

      <section class="content">
        <section class="content-section reveal">
          <h2 class="section-title">About</h2>
          <div class="paragraphs" id="bio-list"></div>
          <p class="interests-line">
            <strong>Research interests:</strong>
            <span id="interest-line"></span>
          </p>
        </section>

        <section class="content-section reveal" id="publications">
          <h2 class="section-title">Publications</h2>
          <div class="publication-list" id="publication-list"></div>
        </section>

        <section class="content-section reveal" id="contact">
          <h2 class="section-title">Contact</h2>
          <p class="contact-note" id="contact-note"></p>
        </section>
      </section>
    </main>

    <script src="site-data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
